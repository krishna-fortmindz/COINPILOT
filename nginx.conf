events {
    worker_connections 1024;
}

http {
    upstream nextjs {
        server nextjs:3000;
    }

    upstream flutter {
        server flutter:5000;
    }

    server {
        listen 80;
        server_name aitradingcopilot.com www.aitradingcopilot.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name aitradingcopilot.com www.aitradingcopilot.com;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Flutter dashboard routes — authenticated app
        location ~ ^/(app|dashboard|analysis|charts|memory|sentiment|listings|risk|journal|chat|alerts|profile) {
            proxy_pass http://flutter;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Flutter static assets
        location /flutter/ {
            proxy_pass http://flutter/;
        }

        # Next.js — all other routes (SEO, landing, blog, auth)
        location / {
            proxy_pass http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Next.js HMR websocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Gzip
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
        gzip_min_length 1000;
    }
}
