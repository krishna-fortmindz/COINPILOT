<!DOCTYPE html>
<html>
<head>
  <base href="/app/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Coinastra — Smart Crypto Intelligence Dashboard">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Coinastra">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Coinastra Dashboard</title>

  <style>
    body {
      background-color: #0a0b0f;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0a0b0f;
    }
    .logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #00ff88, #00cc6a);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      font-size: 24px;
    }
    .loader {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(0,255,136,0.1);
      border-top-color: #00ff88;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .brand {
      color: white;
      font-family: system-ui, sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 24px;
    }
    .brand span { color: #00ff88; }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">⚡</div>
    <div class="brand">Coin<span>astra</span></div>
    <div class="loader"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading').remove();
    });

    // Fix: black screen after Chrome is minimized and reopened on mobile.
    // The OS reclaims GPU memory when backgrounded, causing the WebGL context
    // to be lost. On resume, check if the context is gone and reload if so;
    // otherwise a resize event is enough to wake Flutter's renderer.
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState !== 'visible') return;
      setTimeout(function () {
        var canvas = document.querySelector('canvas');
        if (!canvas) return;
        var gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
        if (gl && gl.isContextLost()) {
          window.location.reload();
        } else {
          window.dispatchEvent(new Event('resize'));
        }
      }, 150);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
