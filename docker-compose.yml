version: "3.9"

services:
  # Next.js SEO / Marketing Layer
  nextjs:
    build:
      context: ./nextjs-app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - FLUTTER_APP_URL=http://flutter:5000
      - NEXT_PUBLIC_FLUTTER_DASHBOARD_URL=http://localhost:5000
    depends_on:
      - flutter
    networks:
      - copilot-net

  # Flutter Web Dashboard
  flutter:
    build:
      context: ./flutter-app
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    networks:
      - copilot-net

  # Nginx reverse proxy (production)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - nextjs
      - flutter
    networks:
      - copilot-net
    profiles:
      - production

networks:
  copilot-net:
    driver: bridge
